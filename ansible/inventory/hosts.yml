# Host IPs are populated by Terraform (see scripts/generate-inventory.sh).
# Cluster config lives in group_vars/all.yml — do not remove that file.

all:
  children:
    k8s_cluster:
      children:
        masters:
          hosts:
            k8s-master:
              ansible_host: 0.0.0.0  # REPLACE — or run scripts/generate-inventory.sh
              node_ip: 10.0.0.0
        workers:
          hosts:
            k8s-worker-1:
              ansible_host: 0.0.0.0
              node_ip: 10.0.0.0
            k8s-worker-2:
              ansible_host: 0.0.0.0
              node_ip: 10.0.0.0
