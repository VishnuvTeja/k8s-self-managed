# Replace ansible_host values after `terraform apply`.
# Or run: terraform output -raw ansible_inventory > inventory/hosts.yml

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    kubernetes_version: "1.29"
    pod_network_cidr: "10.244.0.0/16"
    calico_version: "v3.27.3"
  children:
    k8s_cluster:
      children:
        masters:
          hosts:
            k8s-master:
              ansible_host: 0.0.0.0  # REPLACE with master public IP
              node_ip: 10.0.0.0      # REPLACE with master private IP
        workers:
          hosts:
            k8s-worker-1:
              ansible_host: 0.0.0.0  # REPLACE with worker-1 public IP
              node_ip: 10.0.0.0
            k8s-worker-2:
              ansible_host: 0.0.0.0  # REPLACE with worker-2 public IP
              node_ip: 10.0.0.0
