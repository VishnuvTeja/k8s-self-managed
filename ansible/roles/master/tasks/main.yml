---
- name: Check if cluster is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf

- name: Initialize Kubernetes cluster
  command: >
    kubeadm init
    --apiserver-advertise-address={{ node_ip }}
    --control-plane-endpoint={{ node_ip }}
    --pod-network-cidr={{ pod_network_cidr }}
    --node-name={{ inventory_hostname }}
  when: not admin_conf.stat.exists
  register: kubeadm_init

- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy admin.conf to ubuntu user
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Install Calico CNI
  shell: |
    kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: calico_apply
  changed_when: "'created' in calico_apply.stdout or 'configured' in calico_apply.stdout"
  retries: 5
  delay: 15
  until: calico_apply.rc == 0

- name: Generate kubeadm join command
  command: kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: false

- name: Save join command on master for workers to use
  set_fact:
    kubeadm_join_command: "{{ join_command_raw.stdout }}"

- name: Wait for control plane to be ready
  shell: kubectl get nodes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: nodes_status
  until: "'Ready' in nodes_status.stdout or 'NotReady' in nodes_status.stdout"
  retries: 30
  delay: 10
  changed_when: false
